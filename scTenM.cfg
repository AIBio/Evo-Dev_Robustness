# Calculate chromosome size
CalCS()
{
    fa=$1
    name=$2
    outdir=$3
    [ ! -e ${fa}.fai ] && samtools faidx ${fa}
    cut -f 1-2 ${fa}.fai > ${outdir}/${name}.chrom.sizes 
}
# CellRanger count module
CRrna()
{
    indir=$1
    file=$2
    outdir=$3
    logdir=$4
    ref=$5
    # - indir: directory includes the raw fastq.gz files
    # - file: txt file recorded the key word in raw fastq.gz files
    # - outdir & logdir: directory to save running results and logs
    # - ref: built reference directory
    [ ! -d "${outdir}" ] && mkdir -p ${outdir}
    [ ! -d "${logdir}" ] && mkdir -p ${logdir}
    while read key
    do
        cellranger count --id ${key} --transcriptome ${ref} \
                         --fastqs ${indir} --sample ${key} \
                         --include-introns true --create-bam true \
                         --localcores 20 --localmem 40 > ${logdir}/${key}.log 2>&1
    done < $file
}
CRatac()
{
    indir=$1
    file=$2
    outdir=$3
    logdir=$4
    ref=$5
    # - indir: directory includes the raw fastq.gz files
    # - file: txt file recorded the key word in raw fastq.gz files
    # - outdir & logdir: directory to save running results and logs
    # - ref: built reference directory
    [ ! -d "${outdir}" ] && mkdir -p ${outdir}
    [ ! -d "${logdir}" ] && mkdir -p ${logdir}
    while read key
    do
        cellranger-atac count --id=${key} --reference=${ref} \
                              --fastqs=${indir} --sample=${key} \
                              --localcores=16 --localmem=32 > ${logdir}/${key}.log 2>&1
    done < $file
}
CRarc()
{
    file=$1
    outdir=$2
    logdir=$3
    ref=$4
    lib=$5
    # - indir: directory includes the raw fastq.gz files
    # - file: txt file recorded the key word in raw fastq.gz files
    # - outdir & logdir: directory to save running results and logs
    # - ref: built reference directory
    # - lib: library csv file
    [ ! -d "${outdir}" ] && mkdir -p ${outdir}
    [ ! -d "${logdir}" ] && mkdir -p ${logdir}
    while read key
    do
        cellranger-arc count --id=${key} --reference=${ref} --libraries=${lib} \
                             --min-atac-count 2500 --min-gex-count 750 --nopreflight \
                             --localcores=16 --localmem=32 > ${logdir}/${key}.log 2>&1
    done < $file
}
