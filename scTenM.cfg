# Create soft links for raw fastq files
DataLink()
{
    indir=$1
    sample=$2
    outdir=$3
    [ ! -d ${outdir} ] && mkdir -p ${outdir}
    ls $indir | grep -f $sample - | while read file
    do
        cp ${indir}/${file} ${outdir}/
    done
}
# Create reference
RefCRrna()
{
    seq=$1
    gtf=$2
    gn=$3
    gv=$4
    refdir=$5
    logdir=$6
    # format:
    # - seq: genomic sequence fa file in GENCODE format;
    # - gtf: gene annotation gtf file in GENCODE format but the gene/transcript/exon_id is splited into two column;
    # - gn: genome name, such Homo_sapiens;
    # - gv: genome version, such as GRCh38;
    # - refdir: directory to save reference file for CellRanger;
    [ ! -d "${refdir}" ] && mkdir -p ${refdir}
    [ ! -d "${logdir}" ] && mkdir -p ${logdir}
    cd $refdir
    cellranger mkref --genome="${gn}" --fasta="${seq}" --genes="${gtf}" \
                     --ref-version="${gv}" > ${logdir}/CellRanger_RNA_mkref_${gn}_${gv}.log 2>&1
    cd $wd
}
RefCRatac()
{
    seq=$1
    gtf=$2
    motif=$3
    spe=$4
    gn=$5
    gv=$6
    refdir=$7
    logdir=$8
    [ ! -d "${refdir}" ] && mkdir -p ${refdir}
    [ ! -d "${logdir}" ] && mkdir -p ${logdir}
    # format:
    # - seq: genomic sequence fa file in GENCODE format;
    # - gtf: gene annotation gtf file in GENCODE format but the gene/transcript/exon_id is splited into two column;
    # - motif: TFs motif file from JASPAR;
    # - spe: organism, such as Homo_sapiens;
    # - gn: genome name, such Homo_sapiens;
    # - gv: genome version, such as GRCh38;
    # - refdir: directory to save reference file for CellRanger;
    config="${refdir}/config"
    echo """{
        organism: \"${spe}\"
        genome: [\""${gn}"\"]
        input_fasta: [\""${seq}"\"]
        input_gtf: [\""${gtf}"\"]
        input_motifs: \""${motif}"\"
        non_nuclear_contigs: [\"chrM\"]
    }""" > "$config"
    cd $refdir
    cellranger-atac mkref --ref-version="${gv}" --config="${config}" > ${logdir}/CellRanger_ATAC_mkref_${spe}_${gn}.log 2>&1
    cd $wd
}
